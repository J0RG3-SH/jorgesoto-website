<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Jorge Soto</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&family=Noto+Serif+JP:wght@200&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F7F5F0;
    color: #1A1A18;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
  }
  .code {
    font-family: 'Cormorant Garamond', serif;
    font-size: 8rem;
    font-weight: 300;
    line-height: 1;
    color: #E0DDD6;
    margin-bottom: 1rem;
  }
  .jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    font-weight: 200;
    color: #A09E96;
    letter-spacing: 0.3em;
    margin-bottom: 2rem;
  }
  p {
    color: #6B6860;
    font-weight: 300;
    font-size: 1.05rem;
    margin-bottom: 2.5rem;
    max-width: 400px;
    line-height: 1.7;
  }
  a {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #C45D3E;
    text-decoration: none;
    border-bottom: 1px solid #C45D3E;
    padding-bottom: 2px;
    transition: opacity 0.3s;
  }
  a:hover { opacity: 0.7; }
</style>
</head>
<body>
  <div class="code">404</div>
  <div class="jp">見つかりません</div>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">Back to home</a>
</body>
</html>
